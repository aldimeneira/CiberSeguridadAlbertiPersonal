<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Veterinaria — Acceso</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-card">

    <div class="auth-card__logo">
      <h1>🐾 Clínica Veterinaria</h1>
      <p>Tu bienestar animal, nuestra misión</p>
    </div>

    <div id="alert" class="alert"></div>

    <button class="btn btn--google btn--full" onclick="window.cvAuth.loginWithGoogle()">
      <img src="https://www.google.com/favicon.ico" width="18" alt="Google">
      Continuar con Google
    </button>

    <div class="divider">o con email</div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Iniciar sesión</button>
    </form>

    <p class="auth-card__footer">
      ¿No tienes cuenta? <a href="register.html">Regístrate</a>
    </p>

  </div>

  <script type="module" src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await globalThis.cvAuth.loginWithEmail(email, password);
      } catch (err) {
        alert.className = 'alert alert--error';
        alert.style.display = 'block';
        alert.textContent = '❌ ' + err.message;
      }
    });
  </script>
</body>
</html>
