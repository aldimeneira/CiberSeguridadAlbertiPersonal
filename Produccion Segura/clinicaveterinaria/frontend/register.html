<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — Clínica Veterinaria</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-card__logo">
      <h1>🐾 Clínica Veterinaria</h1>
      <p>Crea tu cuenta</p>
    </div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="full_name">Nombre completo</label>
        <input type="text" id="full_name" name="full_name" placeholder="Juan García" required />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="juan@ejemplo.com" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" minlength="8" required />
      </div>

      <p id="form-message" aria-live="polite"></p>

      <button type="submit" id="submit-btn" class="btn btn--primary" style="width:100%; margin-top:0.5rem;">
        Crear cuenta
      </button>
    </form>

    <div class="auth-card__footer">
      ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
    </div>
  </div>

  <style>
    #form-message {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    #form-message.msg--success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    #form-message.msg--error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000/api'
      : 'https://clinicaveterinaria-api.onrender.com/api';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn   = document.getElementById('submit-btn');
      const msgEl = document.getElementById('form-message');

      msgEl.className = '';
      msgEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      const body = {
        full_name : document.getElementById('full_name').value.trim(),
        email     : document.getElementById('email').value.trim(),
        password  : document.getElementById('password').value,
      };

      if (!body.full_name || !body.email || !body.password) {
        msgEl.className = 'msg--error';
        msgEl.textContent = '❌ Rellena todos los campos';
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
        return;
      }

      if (body.password.length < 8) {
        msgEl.className = 'msg--error';
        msgEl.textContent = '❌ La contraseña debe tener al menos 8 caracteres';
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
        return;
      }

      try {
        const res  = await fetch(`${API_BASE}/auth/register`, {
          method  : 'POST',
          headers : { 'Content-Type': 'application/json' },
          body    : JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok) {
          msgEl.className = 'msg--success';
          msgEl.textContent = '✅ Cuenta creada correctamente. Redirigiendo al login...';
          setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        } else {
          msgEl.className = 'msg--error';
          msgEl.textContent = '❌ ' + (data.error || 'Error al crear la cuenta');
          btn.disabled = false;
          btn.textContent = 'Crear cuenta';
        }

      } catch (err) {
        msgEl.className = 'msg--error';
        msgEl.textContent = '❌ Error de conexión con el servidor';
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>

</body>
</html>
