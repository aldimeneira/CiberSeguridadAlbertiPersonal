services:
  - type: web
    name: clinicaveterinaria-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --production
    startCommand: node src/app.js
    healthCheckPath: /health
    envVars:
      - key: DOPPLER_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000